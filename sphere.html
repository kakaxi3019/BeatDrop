<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Sphere Scene</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #gameOver {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      border: 2px solid #fff;
      padding: 40px 60px;
      text-align: center;
      z-index: 1000;
    }
    #gameOver h1 {
      color: #fff;
      font-size: 48px;
      margin-bottom: 30px;
    }
    #restartBtn {
      background: #ff68fd;
      color: #fff;
      border: none;
      padding: 15px 40px;
      font-size: 20px;
      cursor: pointer;
    }
    #restartBtn:hover {
      background: #ff85fe;
    }
    #comboDisplay {
      display: none;
      position: fixed;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 100;
    }
    #comboText {
      font-size: 64px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 10px var(--glow-color),
                   0 0 20px var(--glow-color),
                   0 0 40px var(--glow-color),
                   0 0 80px var(--glow-color);
    }
    #comboCount {
      font-size: 48px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 10px var(--glow-color),
                   0 0 20px var(--glow-color);
    }
    #victory {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      border: 2px solid #fff;
      padding: 40px 60px;
      text-align: center;
      z-index: 1000;
    }
    #victory h1 {
      color: #fff;
      font-size: 48px;
      margin-bottom: 30px;
    }
    #victoryBtn {
      background: #15befc;
      color: #fff;
      border: none;
      padding: 15px 40px;
      font-size: 20px;
      cursor: pointer;
    }
    #victoryBtn:hover {
      background: #4dd4ff;
    }
    #distanceDisplay {
      position: fixed;
      top: 20px;
      right: 20px;
      text-align: right;
      pointer-events: none;
      z-index: 100;
    }
    #currentDistance {
      font-size: 48px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 10px #ff68fd,
                   0 0 20px #ff68fd,
                   0 0 40px #ff68fd;
    }
    #targetDistance {
      font-size: 24px;
      color: #aaa;
      text-shadow: 0 0 5px #15befc,
                   0 0 10px #15befc;
    }
    #levelSelect {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 2000;
    }
    #levelSelect h1 {
      color: #fff;
      font-size: 72px;
      font-weight: bold;
      text-shadow: 0 0 20px #15befc, 0 0 40px #15befc;
      margin-bottom: 10px;
    }
    #levelSelect .subtitle {
      color: #888;
      font-size: 24px;
      margin-bottom: 50px;
      letter-spacing: 8px;
    }
    .level-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .level-btn {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(20, 20, 30, 0.9);
      border: 2px solid #333;
      padding: 20px 40px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
    }
    .level-btn:hover {
      border-color: #15befc;
      background: rgba(30, 40, 60, 0.9);
      transform: translateX(10px);
    }
    .level-btn .level-num {
      color: #ff68fd;
      font-size: 20px;
      font-weight: bold;
      min-width: 70px;
    }
    .level-btn .level-name {
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      min-width: 200px;
    }
    .level-btn .level-desc {
      color: #888;
      font-size: 16px;
    }
    .level-btn.locked {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .level-btn.locked:hover {
      transform: none;
      border-color: #333;
      background: rgba(20, 20, 30, 0.9);
    }
    .level-btn .lock-icon {
      display: none;
      margin-left: 10px;
    }
    .level-btn.locked .lock-icon {
      display: inline;
    }
    .level-btn.locked .level-name,
    .level-btn.locked .level-desc {
      color: #555;
    }
    #levelName {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
    }
    #levelName span {
      font-size: 24px;
      color: #fff;
      text-shadow: 0 0 10px #15befc;
    }
    #levelName .level-title {
      font-size: 18px;
      color: #888;
      margin-left: 15px;
    }
    #menuBtn {
      position: fixed;
      top: 20px;
      left: 280px;
      background: rgba(30, 30, 40, 0.8);
      border: 1px solid #444;
      color: #fff;
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
      z-index: 100;
    }
    #menuBtn:hover {
      background: rgba(50, 50, 70, 0.9);
      border-color: #15befc;
    }
  </style>
</head>
<body>
  <div id="gameOver">
    <h1>Game Over</h1>
    <p id="continueCount" style="color:#888;margin-bottom:20px;">剩余继续次数：3</p>
    <div style="display:flex;gap:15px;justify-content:center;">
      <button id="restartBtn" style="background:#ff68fd;color:#fff;border:none;padding:15px 40px;font-size:20px;cursor:pointer;">返回选关</button>
      <button id="continueBtn" style="background:#15befc;color:#fff;border:none;padding:15px 40px;font-size:20px;cursor:pointer;">继续</button>
    </div>
  </div>
  <div id="comboDisplay">
    <div id="comboText">PERFECT</div>
    <div id="comboCount">x1</div>
  </div>
  <div id="victory">
    <h1 id="victoryTitle">Victory!</h1>
    <p id="victorySubtitle" style="color:#888;margin-bottom:20px;">完成关卡</p>
    <div style="display:flex;gap:15px;justify-content:center;">
      <button id="nextLevelBtn" style="background:#15befc;color:#fff;border:none;padding:15px 40px;font-size:20px;cursor:pointer;">Next Level</button>
      <button id="victoryBtn" style="background:#ff68fd;color:#fff;border:none;padding:15px 40px;font-size:20px;cursor:pointer;">Level Select</button>
    </div>
  </div>
  <div id="distanceDisplay">
    <div id="currentDistance">0m</div>
    <div id="targetDistance">???m</div>
  </div>
  <div id="levelName">
    <span id="levelNum">第1关</span>
    <span class="level-title" id="levelTitle">Miller's Planet</span>
  </div>
  <button id="menuBtn">菜单</button>
  <div id="levelSelect">
    <h1>星际穿越</h1>
    <p class="subtitle">Interstellar</p>
    <div class="level-list">
      <button class="level-btn" data-level="1">
        <span class="level-num">第1关</span>
        <span class="level-name">Miller's Planet</span>
        <span class="level-desc">全部直线轨道</span>
        <span class="lock-icon">🔒</span>
      </button>
      <button class="level-btn locked" data-level="2">
        <span class="level-num">第2关</span>
        <span class="level-name">Mann's World</span>
        <span class="level-desc">直线 + 双色块 + 加速轨道</span>
        <span class="lock-icon">🔒</span>
      </button>
      <button class="level-btn locked" data-level="3">
        <span class="level-num">第3关</span>
        <span class="level-name">Edmunds' Planet</span>
        <span class="level-desc">直线 + 双色块 + 三色块 + 加速轨道</span>
        <span class="lock-icon">🔒</span>
      </button>
      <button class="level-btn locked" data-level="4">
        <span class="level-num">第4关</span>
        <span class="level-name">Gargantua's Edge</span>
        <span class="level-desc">混合轨道 · 200跳通关</span>
        <span class="lock-icon">🔒</span>
      </button>
      <button class="level-btn locked" data-level="5">
        <span class="level-num">第5关</span>
        <span class="level-name">The Tesseract</span>
        <span class="level-desc">混合轨道 · 1000跳通关</span>
        <span class="lock-icon">🔒</span>
      </button>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Colors: pink=0xff68fd, yellow=0xffe528, blue=0x15befc
    const COLORS = {
      pink: 0xff68fd,
      yellow: 0xffe528,
      blue: 0x15befc
    };
    const COLOR_KEYS = ['pink', 'yellow', 'blue'];

    // Level definitions (Interstellar themed)
    const LEVELS = [
      {
        id: 1,
        name: "Miller's Planet",
        nameCn: "第1关",
        trackTypes: ['straight'],
        jumpsToWin: 1
      },
      {
        id: 2,
        name: "Mann's World",
        nameCn: "第2关",
        trackTypes: ['straight', 'double', 'speedBoost'],
        jumpsToWin: 10
      },
      {
        id: 3,
        name: "Edmunds' Planet",
        nameCn: "第3关",
        trackTypes: ['straight', 'double', 'triple', 'speedBoost'],
        jumpsToWin: 20
      },
      {
        id: 4,
        name: "Gargantua's Edge",
        nameCn: "第4关",
        trackTypes: ['straight', 'double', 'triple', 'speedBoost'],
        jumpsToWin: 200
      },
      {
        id: 5,
        name: "The Tesseract",
        nameCn: "第5关",
        trackTypes: ['straight', 'double', 'triple', 'speedBoost'],
        jumpsToWin: 1000
      }
    ];

    let currentLevel = 1;
    let unlockedLevels = [1]; // Start with only level 1 unlocked
    let continueCount = 3; // Continue attempts per game

    // Sphere
    const sphereGeo = new THREE.SphereGeometry(0.9, 64, 64);
    const sphereMat = new THREE.MeshPhysicalMaterial({
      color: 0x3498db,
      metalness: 0.1,
      roughness: 0.2,
      transmission: 0.6,
      thickness: 1.5,
      emissive: 0x000000,
      emissiveIntensity: 0,
    });
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    scene.add(sphere);

    // Track segments - three types
    let segments = [];
    const segmentTypes = ['straight', 'triple', 'double', 'speedBoost'];
    const segmentLengths = { straight: 6, triple: 6, double: 6, speedBoost: 6 };

    function randomColor() {
      return COLORS[COLOR_KEYS[Math.floor(Math.random() * COLOR_KEYS.length)]];
    }

    function createStraightSegment(z, color) {
      const group = new THREE.Group();
      group.userData.type = 'straight';
      const mat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.5 });
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(6, 0.15, 1.5), mat);
      mesh.position.y = -0.45;
      group.add(mesh);
      group.position.z = z;
      group.userData.length = 6;
      group.userData.color = color;
      scene.add(group);
      return group;
    }

    function createTripleSegment(z, requiredColor) {
      const group = new THREE.Group();
      group.userData.type = 'triple';
      // Triple: 3 blocks centered around X=0
      // Block width 2.0, spacing 2.2, so: block0 at -2.2, block1 at 0, block2 at 2.2
      const colors = [COLORS.pink, COLORS.yellow, COLORS.blue];
      // Shuffle positions
      for (let i = colors.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [colors[i], colors[j]] = [colors[j], colors[i]];
      }
      for (let i = 0; i < 3; i++) {
        const mat = new THREE.MeshStandardMaterial({ color: colors[i], emissive: colors[i], emissiveIntensity: 0.5 });
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.15, 1.5), mat);
        mesh.position.set(-2.2 + i * 2.2, -0.45, 0);
        group.add(mesh);
      }
      group.position.z = z;
      group.userData.length = 6;
      scene.add(group);
      return group;
    }

    function createDoubleSegment(z, requiredColor) {
      const group = new THREE.Group();
      group.userData.type = 'double';
      // Double: 2 blocks centered around X=0
      // Block width 2.0, spacing 2.5, so: block0 at -1.25, block1 at 1.25
      const otherColors = COLOR_KEYS.filter(k => COLORS[k] !== requiredColor);
      const otherColor = COLORS[otherColors[Math.floor(Math.random() * otherColors.length)]];
      const colors = [requiredColor, otherColor];
      // Shuffle positions
      if (Math.random() > 0.5) [colors[0], colors[1]] = [colors[1], colors[0]];
      for (let i = 0; i < 2; i++) {
        const mat = new THREE.MeshStandardMaterial({ color: colors[i], emissive: colors[i], emissiveIntensity: 0.5 });
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.15, 1.5), mat);
        mesh.position.set(-1.25 + i * 2.5, -0.45, 0);
        group.add(mesh);
      }
      group.position.z = z;
      group.userData.length = 6;
      scene.add(group);
      return group;
    }

    function createSpeedBoostSegment(z) {
      const group = new THREE.Group();
      group.userData.type = 'speedBoost';
      // White glowing track
      const mat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        emissive: 0xffffff,
        emissiveIntensity: 0.8
      });
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(6, 0.15, 1.5), mat);
      mesh.position.y = -0.45;
      group.add(mesh);
      group.position.z = z;
      group.userData.length = 6;
      scene.add(group);
      return group;
    }

    function createSegment(type, z, requiredColor) {
      if (type === 'straight') return createStraightSegment(z, requiredColor);
      if (type === 'triple') return createTripleSegment(z, requiredColor);
      if (type === 'double') return createDoubleSegment(z, requiredColor);
      if (type === 'speedBoost') return createSpeedBoostSegment(z);
    }

    // Physics constants
    const gravity = 25;
    const bounceHeight = 2;
    const groundY = 0;
    const sphereRadius = 0.9;
    const tFall = Math.sqrt(2 * bounceHeight / gravity);
    const bouncePeriod = 2 * tFall;

    let pathColor = 0x3498db; // Color of previous straight track (ball's current color)

    // Initialize segments
    function initSegments() {
      const level = LEVELS[currentLevel - 1];
      const availableTypes = level.trackTypes;

      segments = [];
      // First straight
      const firstColor = randomColor();
      const firstStraight = createStraightSegment(0, firstColor);
      segments.push(firstStraight);
      pathColor = firstColor;

      let currentZ = firstStraight.userData.length;
      for (let i = 1; i < 25; i++) {
        let type;
        if (i % 4 === 0) {
          type = 'straight';
        } else {
          // Use types available in current level (exclude 'straight' for non-periodic segments)
          const nonStraightTypes = availableTypes.filter(t => t !== 'straight');
          if (nonStraightTypes.length > 0) {
            // Give speedBoost lower probability (1/4 chance when available)
            if (nonStraightTypes.includes('speedBoost') && Math.random() < 0.2) {
              type = 'speedBoost';
            } else {
              const typesWithoutSpeed = nonStraightTypes.filter(t => t !== 'speedBoost');
              if (typesWithoutSpeed.length > 0) {
                type = typesWithoutSpeed[Math.floor(Math.random() * typesWithoutSpeed.length)];
              } else {
                type = nonStraightTypes[0];
              }
            }
          } else {
            type = 'straight';
          }
        }
        let segColor = pathColor;
        if (type === 'straight') {
          segColor = randomColor();
          pathColor = segColor;
        }
        const seg = createSegment(type, -currentZ, segColor);
        segments.push(seg);
        currentZ += seg.userData.length;
      }
    }
    initSegments();

    let sphereVY = 0;
    let onGround = true;
    let currentSegmentIndex = 0;
    let sharedVelocity = 0;
    let ballColor = 0x3498db;
    let gameOver = false;
    let shatterParticles = [];
    let shatterTime = 0;
    const shatterDuration = 1;

    // Speed boost state
    let speedBoostActive = false;
    let speedBoostTimer = 0;
    const speedBoostDuration = 10; // 10 seconds
    const speedBoostVelocityMultiplier = 2; // 2x speed
    const originalGravity = 25;

    // Speed boost particles
    const speedBoostParticles = [];
    const speedBoostParticleCount = 30;

    // Combo display
    let comboCount = 0;
    let comboTimeout = null;
    const comboDisplay = document.getElementById('comboDisplay');
    const comboText = document.getElementById('comboText');
    const comboCountEl = document.getElementById('comboCount');

    function showCombo() {
      comboCount++;
      // 80% PERFECT, 20% GREAT
      const text = Math.random() < 0.8 ? 'PERFECT' : 'GREAT';
      comboText.textContent = text;
      comboCountEl.textContent = 'x' + comboCount;
      // Update glow color based on ball color
      const colorHex = '#' + ballColor.toString(16).padStart(6, '0');
      comboDisplay.style.setProperty('--glow-color', colorHex);
      comboDisplay.style.display = 'block';
      // Clear existing timeout
      if (comboTimeout) clearTimeout(comboTimeout);
      // Hide after 0.8 seconds
      comboTimeout = setTimeout(() => {
        comboDisplay.style.display = 'none';
      }, 800);
    }

    // Win condition - collision counter
    let collisionCount = 0;
    let collisionsToWin = 20;
    let currentDistance = 0;
    let targetDistance = 100; // Target distance in meters
    const distanceDisplay = document.getElementById('currentDistance');
    const targetDistanceEl = document.getElementById('targetDistance');
    let blackHole = null;
    let blackHoleActive = false;
    let blackHoleZ = -100;

    // Victory event listener
    document.getElementById('victoryBtn').addEventListener('click', () => {
      document.getElementById('victory').style.display = 'none';
      document.getElementById('levelSelect').style.display = 'flex';
    });

    // Next level button
    document.getElementById('nextLevelBtn').addEventListener('click', () => {
      document.getElementById('victory').style.display = 'none';
      if (currentLevel < LEVELS.length) {
        currentLevel++;
        startLevel();
      } else {
        document.getElementById('levelSelect').style.display = 'flex';
      }
    });

    // Level selection buttons
    document.querySelectorAll('.level-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const level = parseInt(btn.dataset.level);
        if (!unlockedLevels.includes(level)) return; // Can't select locked levels
        currentLevel = level;
        document.getElementById('levelSelect').style.display = 'none';
        startLevel();
      });
    });

    function updateLevelButtons() {
      document.querySelectorAll('.level-btn').forEach(btn => {
        const level = parseInt(btn.dataset.level);
        if (unlockedLevels.includes(level)) {
          btn.classList.remove('locked');
        } else {
          btn.classList.add('locked');
        }
      });
    }

    function unlockNextLevel() {
      const nextLevel = currentLevel + 1;
      if (nextLevel <= LEVELS.length && !unlockedLevels.includes(nextLevel)) {
        unlockedLevels.push(nextLevel);
        updateLevelButtons();
      }
    }

    // Menu button - show level select
    document.getElementById('menuBtn').addEventListener('click', () => {
      document.getElementById('levelSelect').style.display = 'flex';
    });

    function startLevel() {
      const level = LEVELS[currentLevel - 1];
      collisionsToWin = level.jumpsToWin;
      targetDistance = collisionsToWin * 20; // 每跳约20米
      continueCount = 3; // Reset continue count

      // Update level name display
      document.getElementById('levelNum').textContent = level.nameCn;
      document.getElementById('levelTitle').textContent = level.name;

      // Update level buttons lock state
      updateLevelButtons();

      // Reset game state
      sphere.visible = true;
      sphere.position.set(0, bounceHeight + sphereRadius, 0);
      sphereMat.color.setHex(0x3498db);
      sphereMat.emissive.setHex(0x000000);
      sphereMat.emissiveIntensity = 0;
      ballColor = 0x3498db;

      // Clean up old segments
      segments.forEach(seg => {
        seg.traverse(child => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) child.material.dispose();
        });
        scene.remove(seg);
      });

      // Clean up ripples
      ripples.forEach(r => {
        r.geometry.dispose();
        r.material.dispose();
      });
      ripples.length = 0;

      // Clean up black hole
      if (blackHole) {
        scene.remove(blackHole);
        blackHole.geometry.dispose();
        blackHole.material.dispose();
        blackHole = null;
      }

      initSegments();
      sphereVY = 0;
      onGround = true;
      currentSegmentIndex = 0;
      sharedVelocity = 0;
      gameOver = false;
      mouseX = 0;
      comboCount = 0;
      comboDisplay.style.display = 'none';
      if (comboTimeout) clearTimeout(comboTimeout);
      collisionCount = 0;
      blackHoleActive = false;
      currentDistance = 0;
      distanceDisplay.textContent = '0m';
      targetDistanceEl.textContent = '???m';
      speedBoostActive = false;
      speedBoostTimer = 0;
      clearSpeedBoostParticles();
    }

    function createBlackHole(z) {
      const geometry = new THREE.CircleGeometry(3, 64);
      const material = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uColor: { value: new THREE.Color(0x000000) }
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform float uTime;
          varying vec2 vUv;
          void main() {
            vec2 center = vUv - 0.5;
            float dist = length(center);
            float angle = atan(center.y, center.x);
            float spiral = sin(angle * 8.0 + dist * 20.0 - uTime * 5.0) * 0.5 + 0.5;
            float ring = smoothstep(0.3, 0.5, dist) * smoothstep(0.6, 0.5, dist);
            float alpha = ring * spiral * smoothstep(0.6, 0.3, dist);
            alpha = max(alpha, smoothstep(0.3, 0.0, dist) * 0.8);
            vec3 color = mix(vec3(0.0), vec3(0.2, 0.0, 0.4), spiral);
            gl_FragColor = vec4(color, alpha);
          }
        `,
        transparent: true,
        side: THREE.DoubleSide
      });
      blackHole = new THREE.Mesh(geometry, material);
      blackHole.position.set(0, 2, z);
      blackHole.userData.isBlackHole = true;
      scene.add(blackHole);

      // Add glow ring
      const glowGeo = new THREE.RingGeometry(2.8, 3.5, 64);
      const glowMat = new THREE.MeshBasicMaterial({
        color: 0x8800ff,
        transparent: true,
        opacity: 0.5,
        side: THREE.DoubleSide
      });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      glow.position.z = 0.01;
      blackHole.add(glow);
    }

    function triggerVictory() {
      gameOver = true;
      sphere.visible = false;
      if (blackHole) {
        scene.remove(blackHole);
        blackHole.geometry.dispose();
        blackHole.material.dispose();
        blackHole = null;
      }
      comboDisplay.style.display = 'none';

      // Unlock next level
      unlockNextLevel();

      // Update victory screen
      const level = LEVELS[currentLevel - 1];
      document.getElementById('victoryTitle').textContent = level.name;
      document.getElementById('victorySubtitle').textContent = currentLevel < LEVELS.length ? '关卡完成!' : '恭喜通关全部关卡!';
      document.getElementById('nextLevelBtn').style.display = currentLevel < LEVELS.length ? 'block' : 'none';

      document.getElementById('victory').style.display = 'block';
    }

    // Ripple effects
    const ripples = [];

    function createRipple(parentGroup, localX, color) {
      // Create multiple concentric rings for better visual effect
      for (let i = 0; i < 3; i++) {
        const innerRadius = 0.2 + i * 0.3;
        const outerRadius = innerRadius + 0.15;
        const geometry = new THREE.RingGeometry(innerRadius, outerRadius, 32);
        const material = new THREE.MeshBasicMaterial({
          color: color,
          transparent: true,
          opacity: 0.8 - i * 0.2,
          side: THREE.DoubleSide
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(localX, 0.08, 0);
        mesh.rotation.x = -Math.PI / 2;
        mesh.userData.scale = 1;
        mesh.userData.expandSpeed = 2 + i * 0.5;
        mesh.userData.baseOpacity = 0.8 - i * 0.2;
        mesh.userData.age = 0;
        mesh.userData.delay = i * 0.1;
        parentGroup.add(mesh);
        if (!parentGroup.userData.ripples) parentGroup.userData.ripples = [];
        parentGroup.userData.ripples.push(mesh);
        ripples.push(mesh);
      }

      // Create particle burst effect
      createParticleBurst(parentGroup, localX, color);
    }

    function createParticleBurst(parentGroup, localX, color) {
      const particleCount = 15;
      for (let i = 0; i < particleCount; i++) {
        const geometry = new THREE.SphereGeometry(0.08, 8, 8);
        const material = new THREE.MeshBasicMaterial({
          color: color,
          transparent: true,
          opacity: 1
        });
        const particle = new THREE.Mesh(geometry, material);
        const angle = (i / particleCount) * Math.PI * 2;
        const speed = 1 + Math.random() * 2;
        particle.position.set(localX, 0.1, 0);
        particle.userData.velocity = new THREE.Vector3(
          Math.cos(angle) * speed,
          0.5 + Math.random() * 1.5,
          Math.sin(angle) * speed
        );
        particle.userData.life = 1;
        particle.userData.decay = 0.8 + Math.random() * 0.4;
        particle.userData.isParticle = true;
        parentGroup.add(particle);
        if (!parentGroup.userData.ripples) parentGroup.userData.ripples = [];
        parentGroup.userData.ripples.push(particle);
        ripples.push(particle);
      }
    }

    // Speed boost particles
    function createSpeedBoostParticles() {
      // Clear existing particles
      speedBoostParticles.forEach(p => {
        scene.remove(p);
        p.geometry.dispose();
        p.material.dispose();
      });
      speedBoostParticles.length = 0;

      for (let i = 0; i < speedBoostParticleCount; i++) {
        const geometry = new THREE.SphereGeometry(0.1, 8, 8);
        const material = new THREE.MeshBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.8
        });
        const particle = new THREE.Mesh(geometry, material);
        // Random position around ball
        particle.position.set(
          sphere.position.x + (Math.random() - 0.5) * 3,
          sphere.position.y + (Math.random() - 0.5) * 2,
          sphere.position.z + (Math.random() - 0.5) * 3
        );
        particle.userData.offset = Math.random() * Math.PI * 2;
        particle.userData.speed = 0.5 + Math.random() * 1.5;
        particle.userData.radius = 1 + Math.random() * 1.5;
        particle.userData.verticalSpeed = (Math.random() - 0.5) * 0.5;
        scene.add(particle);
        speedBoostParticles.push(particle);
      }
    }

    function updateSpeedBoostParticles(time) {
      for (const particle of speedBoostParticles) {
        const offset = particle.userData.offset;
        const speed = particle.userData.speed;
        const radius = particle.userData.radius;
        const verticalSpeed = particle.userData.verticalSpeed;

        // Orbit around ball
        const angle = time * speed + offset;
        particle.position.x = sphere.position.x + Math.cos(angle) * radius;
        particle.position.y = sphere.position.y + Math.sin(time * 2 + offset) * 0.5 + verticalSpeed * time;
        particle.position.z = sphere.position.z + Math.sin(angle) * radius;

        // Pulse opacity
        particle.material.opacity = 0.4 + Math.sin(time * 5 + offset) * 0.3;
      }
    }

    function clearSpeedBoostParticles() {
      speedBoostParticles.forEach(p => {
        scene.remove(p);
        p.geometry.dispose();
        p.material.dispose();
      });
      speedBoostParticles.length = 0;
    }

    // Lights
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);
    const pointLight1 = new THREE.PointLight(0x3498db, 2, 50);
    pointLight1.position.set(5, 5, 5);
    scene.add(pointLight1);
    const pointLight2 = new THREE.PointLight(0xe74c3c, 1.5, 50);
    pointLight2.position.set(-5, -3, -5);
    scene.add(pointLight2);

    camera.position.set(0, 6, 15);
    camera.lookAt(0, 2, -5);

    let mouseX = 0;
    const mouseSensitivity = 6;
    document.addEventListener('mousemove', e => {
      mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    });

    // Shatter effect
    function createShatterEffect() {
      const particleCount = 100;
      const geometry = new THREE.SphereGeometry(0.15, 8, 8);
      const color = sphereMat.color.getHex();

      for (let i = 0; i < particleCount; i++) {
        const mat = new THREE.MeshBasicMaterial({ color: color });
        const particle = new THREE.Mesh(geometry, mat);
        particle.position.copy(sphere.position);
        particle.userData.velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 10,
          Math.random() * 8,
          (Math.random() - 0.5) * 10
        );
        particle.userData.rotationSpeed = new THREE.Vector3(
          Math.random() * 5,
          Math.random() * 5,
          Math.random() * 5
        );
        scene.add(particle);
        shatterParticles.push(particle);
      }
    }

    function triggerGameOver() {
      gameOver = true;
      shatterTime = 0;
      sphere.visible = false;
      createShatterEffect();
      comboDisplay.style.display = 'none';
      // Update continue count display
      document.getElementById('continueCount').textContent = '剩余继续次数：' + continueCount;
      // Show continue button only if continues available
      document.getElementById('continueBtn').style.display = continueCount > 0 ? 'block' : 'none';
      setTimeout(() => {
        document.getElementById('gameOver').style.display = 'block';
      }, shatterDuration * 1000);
    }

    function restartGame() {
      document.getElementById('gameOver').style.display = 'none';
      shatterParticles.forEach(p => {
        scene.remove(p);
        p.geometry.dispose();
        p.material.dispose();
      });
      shatterParticles = [];
      ripples.forEach(r => {
        scene.remove(r);
        r.geometry.dispose();
        r.material.dispose();
      });
      ripples.length = 0;
      segments.forEach(seg => {
        seg.traverse(child => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) child.material.dispose();
        });
        scene.remove(seg);
      });
      sphere.visible = true;
      sphere.position.set(0, bounceHeight + sphereRadius, 0);
      sphereMat.color.setHex(0x3498db);
      sphereMat.emissive.setHex(0x000000);
      sphereMat.emissiveIntensity = 0;
      ballColor = 0x3498db;
      collisionsToWin = LEVELS[currentLevel - 1].jumpsToWin;
      targetDistance = collisionsToWin * 20; // 每跳约20米
      initSegments();
      sphereVY = 0;
      onGround = true;
      currentSegmentIndex = 0;
      sharedVelocity = 0;
      gameOver = false;
      mouseX = 0;
      comboCount = 0;
      comboDisplay.style.display = 'none';
      if (comboTimeout) clearTimeout(comboTimeout);
      collisionCount = 0;
      if (blackHole) {
        scene.remove(blackHole);
        blackHole.geometry.dispose();
        blackHole.material.dispose();
        blackHole = null;
      }
      blackHoleActive = false;
      currentDistance = 0;
      distanceDisplay.textContent = '0m';
      targetDistanceEl.textContent = '???m';
      speedBoostActive = false;
      speedBoostTimer = 0;
      clearSpeedBoostParticles();
    }

    document.getElementById('restartBtn').addEventListener('click', () => {
      document.getElementById('gameOver').style.display = 'none';
      document.getElementById('levelSelect').style.display = 'flex';
    });

    document.getElementById('continueBtn').addEventListener('click', () => {
      if (continueCount > 0) {
        continueCount--;
        document.getElementById('gameOver').style.display = 'none';
        // Resume game without resetting data
        sphere.visible = true;
        sphere.position.set(0, bounceHeight + sphereRadius, 0);
        sphereMat.color.setHex(ballColor);
        sphereMat.emissive.setHex(ballColor);
        sphereMat.emissiveIntensity = 0.5;
        sphereVY = 0;
        onGround = true;
        gameOver = false;
        mouseX = 0;
        comboDisplay.style.display = 'none';
        if (comboTimeout) clearTimeout(comboTimeout);
        shatterParticles.forEach(p => {
          scene.remove(p);
          p.geometry.dispose();
          p.material.dispose();
        });
        shatterParticles = [];
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      const dt = 1 / 60;

      if (gameOver) {
        shatterTime += dt;
        shatterParticles.forEach(p => {
          p.userData.velocity.y -= gravity * dt;
          p.position.add(p.userData.velocity.clone().multiplyScalar(dt));
          p.rotation.x += p.userData.rotationSpeed.x * dt;
          p.rotation.y += p.userData.rotationSpeed.y * dt;
          p.rotation.z += p.userData.rotationSpeed.z * dt;
          const alpha = 1 - shatterTime / shatterDuration;
          p.material.opacity = alpha;
          p.material.transparent = true;
        });
        camera.position.x = 0;
        camera.position.y = 6;
        camera.position.z = 15;
        camera.lookAt(0, 2, -5);
        renderer.render(scene, camera);
        return;
      }

      // Calculate current gravity (3x if speed boost active)
      const currentGravity = speedBoostActive ? originalGravity * speedBoostGravityMultiplier : originalGravity;

      // Update speed boost timer
      if (speedBoostActive) {
        speedBoostTimer -= dt;
        // Update particles orbiting around ball
        updateSpeedBoostParticles(performance.now() / 1000);
        if (speedBoostTimer <= 0) {
          speedBoostActive = false;
          speedBoostTimer = 0;
          // Clear speed boost particles
          clearSpeedBoostParticles();
        }
      }

      // Calculate effective velocity (2x when speed boost active)
      const effectiveVelocity = sharedVelocity * (speedBoostActive ? speedBoostVelocityMultiplier : 1);

      if (onGround) {
        // Use original gravity for bounce to maintain proper arc
        sphereVY = Math.sqrt(2 * originalGravity * bounceHeight);
        onGround = false;
      }
      sphereVY -= originalGravity * dt;
      sphere.position.y += sphereVY * dt;

      if (sphere.position.y <= groundY + sphereRadius) {
        sphere.position.y = groundY + sphereRadius;
        onGround = true;

        const currentSeg = segments[currentSegmentIndex];
        const nextIndex = (currentSegmentIndex + 1) % segments.length;
        const nextSeg = segments[nextIndex];

        // If landing on straight track, change ball color
        if (currentSeg.userData.type === 'straight') {
          const mat = currentSeg.children[0].material;
          createRipple(currentSeg, 0, mat.color.getHex());
          sphereMat.color.setHex(mat.color.getHex());
          sphereMat.emissive.setHex(mat.color.getHex());
          sphereMat.emissiveIntensity = 0.5;
          ballColor = mat.color.getHex();
          // pathColor = ball's current color
          pathColor = ballColor;
          // Survived! Show combo
          showCombo();
          collisionCount++;
          // Check win condition
          if (collisionCount >= collisionsToWin && !blackHoleActive) {
            blackHoleActive = true;
            // Spawn black hole ahead of current position
            blackHoleZ = -30;
            createBlackHole(blackHoleZ);
          }
        }

        // Speed boost track - activate 3x gravity for 10 seconds
        if (currentSeg.userData.type === 'speedBoost') {
          createRipple(currentSeg, 0, 0xffffff);
          // Activate speed boost
          speedBoostActive = true;
          speedBoostTimer = speedBoostDuration;
          // Create speed boost particles
          createSpeedBoostParticles();
          // Survived! Show combo
          showCombo();
          collisionCount++;
          // Check win condition
          if (collisionCount >= collisionsToWin && !blackHoleActive) {
            blackHoleActive = true;
            blackHoleZ = -30;
            createBlackHole(blackHoleZ);
          }
        }

        // Check collision for triple/double segments (straight excluded)
        // Ball lands on one specific block based on X position
        if (currentSeg.userData.type === 'triple' || currentSeg.userData.type === 'double') {
          const ballX = sphere.position.x;
          // Find which block the ball landed on based on X position
          let landedBlock = null;
          let landedBlockLocalX = 0;
          for (const block of currentSeg.children) {
            const blockWorldX = block.position.x; // relative to segment
            const halfWidth = 1.3; // box width / 2 + tolerance
            if (ballX >= blockWorldX - halfWidth && ballX <= blockWorldX + halfWidth) {
              landedBlock = block;
              landedBlockLocalX = block.position.x;
              break;
            }
          }
          // If landed on a block, check if colors match
          if (landedBlock) {
            const blockColor = landedBlock.material.color.getHex();
            createRipple(currentSeg, landedBlockLocalX, blockColor);
            if (blockColor !== ballColor) {
              triggerGameOver();
              return;
            }
            // Survived! Show combo
            showCombo();
            collisionCount++;
            // Check win condition
            if (collisionCount >= collisionsToWin && !blackHoleActive) {
              blackHoleActive = true;
              blackHoleZ = -30;
              createBlackHole(blackHoleZ);
            }
          } else {
            // Didn't land on any block (between blocks) - survive but shake
            // Don't die, just small penalty or visual feedback
          }
        }

        // Distance between segment centers
        const distance = Math.abs(nextSeg.position.z - currentSeg.position.z);
        // Calculate bounce period based on original gravity for consistent ball physics
        const actualBouncePeriod = 2 * Math.sqrt(2 * bounceHeight / originalGravity);
        sharedVelocity = distance / actualBouncePeriod;
        currentSegmentIndex = nextIndex;
      }

      sphere.position.x = Math.max(-3.0, Math.min(3.0, mouseX * mouseSensitivity));
      sphere.rotation.z -= 0.03;

      // Update distance - use actual z distance to black hole
      if (blackHoleActive && blackHole) {
        // Current distance is how far we've traveled (initial gap - current gap)
        const initialGap = 30; // blackHoleZ is -30
        const currentGap = Math.abs(blackHole.position.z - sphere.position.z);
        currentDistance = initialGap - currentGap;
        distanceDisplay.textContent = Math.floor(currentDistance) + 'm';
        targetDistanceEl.textContent = '目标：' + Math.floor(currentGap) + 'm';
      } else {
        // Before black hole appears, estimate distance based on progress
        distanceDisplay.textContent = Math.floor(currentDistance) + 'm';
        targetDistanceEl.textContent = '目标：???m';
      }

      // Move all segments and recycle

      // Update ripples
      for (let i = ripples.length - 1; i >= 0; i--) {
        const ripple = ripples[i];
        if (ripple.userData.disposed) continue;

        ripple.userData.age += dt;

        if (ripple.userData.isParticle) {
          // Particle movement and fade
          if (ripple.userData.age < ripple.userData.delay) continue;
          ripple.userData.velocity.y -= 3 * dt; // gravity
          ripple.position.add(ripple.userData.velocity.clone().multiplyScalar(dt));
          ripple.userData.life -= ripple.userData.decay * dt;
          ripple.material.opacity = Math.max(0, ripple.userData.life);
          if (ripple.userData.life <= 0) {
            ripple.userData.disposed = true;
            if (ripple.parent) ripple.parent.remove(ripple);
            ripple.geometry.dispose();
            ripple.material.dispose();
            ripples.splice(i, 1);
          }
        } else {
          // Ring expansion and fade
          if (ripple.userData.age < ripple.userData.delay) continue;
          const progress = (ripple.userData.age - ripple.userData.delay) / (1 / ripple.userData.expandSpeed);
          ripple.userData.scale = 1 + progress;
          ripple.scale.set(ripple.userData.scale, ripple.userData.scale, 1);
          ripple.material.opacity = Math.max(0, ripple.userData.baseOpacity * (1 - progress));
          if (progress >= 1) {
            ripple.userData.disposed = true;
            if (ripple.parent) ripple.parent.remove(ripple);
            ripple.geometry.dispose();
            ripple.material.dispose();
            ripples.splice(i, 1);
          }
        }
      }
      for (let i = 0; i < segments.length; i++) {
        const seg = segments[i];
        seg.position.z += effectiveVelocity * dt;

        if (seg.position.z > 30) {
          // Clean up ripples first
          if (seg.userData.ripples) {
            for (const r of seg.userData.ripples) {
              r.userData.disposed = true;
              const idx = ripples.indexOf(r);
              if (idx !== -1) ripples.splice(idx, 1);
              if (r.parent) r.parent.remove(r);
              r.geometry.dispose();
              r.material.dispose();
            }
          }
          seg.traverse(child => {
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
          });
          scene.remove(seg);

          // Determine new segment type
          let type;
          const level = LEVELS[currentLevel - 1];
          const distFromLastStraight = i - segments.findIndex(s => s.userData.type === 'straight');
          if (distFromLastStraight >= 0 && (distFromLastStraight % 4 === 0)) {
            type = 'straight';
          } else {
            // Get available types for current level (exclude 'straight')
            const availableTypes = level.trackTypes.filter(t => t !== 'straight');
            if (availableTypes.length > 0) {
              // Give speedBoost lower probability (1/4 chance when available)
              const nonSpeedTypes = availableTypes.filter(t => t !== 'speedBoost');
              if (availableTypes.includes('speedBoost') && Math.random() < 0.2) {
                type = 'speedBoost';
              } else if (nonSpeedTypes.length > 0) {
                type = nonSpeedTypes[Math.floor(Math.random() * nonSpeedTypes.length)];
              } else {
                type = availableTypes[0];
              }
            } else {
              type = 'straight';
            }
          }

          // Find the segment furthest back (smallest z) among remaining
          let minZ = Infinity;
          for (const s of segments) {
            if (s.position.z < minZ) minZ = s.position.z;
          }
          // Place new segment immediately after the furthest-back segment
          // Gap of 0.3 units ensures continuous track
          const newZ = minZ - segmentLengths[type] - 0.3;
          const newColor = type === 'straight' ? randomColor() : pathColor;
          segments[i] = createSegment(type, newZ, newColor);
          if (type === 'straight') {
            pathColor = newColor;
          }
        }
      }

      // Black hole animation and ball absorption
      if (blackHoleActive && blackHole) {
        // Animate black hole spiral
        blackHole.material.uniforms.uTime.value += dt;
        blackHole.rotation.z += dt * 2;

        // Move black hole toward camera at same rate as segments move
        blackHole.position.z += effectiveVelocity * dt;

        // Check if ball is absorbed
        const bhPos = blackHole.position;
        const dist = Math.sqrt(
          Math.pow(sphere.position.x - bhPos.x, 2) +
          Math.pow(sphere.position.y - bhPos.y, 2) +
          Math.pow(sphere.position.z - bhPos.z, 2)
        );
        if (dist < 2.5) {
          // Ball absorbed by black hole - victory!
          triggerVictory();
          return;
        }

        // Pull ball toward black hole when close
        if (dist < 10) {
          const pullStrength = (10 - dist) * 0.01;
          sphere.position.x += (bhPos.x - sphere.position.x) * pullStrength;
          sphere.position.y += (bhPos.y - sphere.position.y) * pullStrength;
          sphere.position.z += (bhPos.z - sphere.position.z) * pullStrength;
        }
      }

      camera.position.x = 0;
      camera.position.y = 6;
      camera.position.z = 15;
      camera.lookAt(0, 2, -5);
      renderer.render(scene, camera);
    }

    // Show level select at start
    updateLevelButtons();
    document.getElementById('levelSelect').style.display = 'flex';

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
