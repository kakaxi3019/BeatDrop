<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeatDrop - 星际穿越</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #renderCanvas { width: 100%; height: 100%; display: block; touch-action: none; }

    /* Game Over Overlay */
    #gameOver {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      border: 2px solid #fff;
      padding: 40px 60px;
      text-align: center;
      z-index: 1000;
    }
    #gameOver h1 { color: #fff; font-size: 48px; margin-bottom: 30px; }
    .btn-group { display: flex; gap: 15px; justify-content: center; }
    .btn {
      border: none;
      padding: 15px 40px;
      font-size: 20px;
      cursor: pointer;
      color: #fff;
    }
    .btn-primary { background: #ff68fd; }
    .btn-primary:hover { background: #ff85fe; }
    .btn-secondary { background: #15befc; }
    .btn-secondary:hover { background: #4dd4ff; }

    /* Combo Display */
    #comboDisplay {
      display: none;
      position: fixed;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 100;
    }
    #comboText {
      font-size: 64px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 10px var(--glow-color), 0 0 20px var(--glow-color),
                   0 0 40px var(--glow-color), 0 0 80px var(--glow-color);
    }
    #comboCount {
      font-size: 48px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 10px var(--glow-color), 0 0 20px var(--glow-color);
    }

    /* Countdown Display */
    #countdownDisplay {
      display: none;
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 150px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 20px #15befc, 0 0 40px #15befc;
      z-index: 500;
      pointer-events: none;
    }

    /* Victory Overlay */
    #victory {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      border: 2px solid #fff;
      padding: 40px 60px;
      text-align: center;
      z-index: 1000;
    }
    #victory h1 { color: #fff; font-size: 48px; margin-bottom: 30px; }
    #victorySubtitle { color: #888; margin-bottom: 20px; font-size: 18px; }

    /* Distance Display */
    #distanceDisplay {
      position: fixed;
      top: 20px;
      right: 20px;
      text-align: right;
      pointer-events: none;
      z-index: 100;
    }
    #currentDistance {
      font-size: 48px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 10px #ff68fd, 0 0 20px #ff68fd, 0 0 40px #ff68fd;
    }
    #targetDistance {
      font-size: 24px;
      color: #aaa;
      text-shadow: 0 0 5px #15befc, 0 0 10px #15befc;
    }

    /* Level Name */
    #levelName {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
    }
    #levelName span { font-size: 24px; color: #fff; text-shadow: 0 0 10px #15befc; }
    #levelName .level-title { font-size: 18px; color: #888; margin-left: 15px; }

    /* Menu Button */
    #menuBtn {
      position: fixed;
      top: 20px;
      left: 280px;
      background: rgba(30, 30, 40, 0.8);
      border: 1px solid #444;
      color: #fff;
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
      z-index: 100;
    }
    #menuBtn:hover { background: rgba(50, 50, 70, 0.9); border-color: #15befc; }

    /* Level Select */
    #levelSelect {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 2000;
    }
    #levelSelect h1 {
      color: #fff;
      font-size: 72px;
      font-weight: bold;
      text-shadow: 0 0 20px #15befc, 0 0 40px #15befc;
      margin-bottom: 10px;
    }
    #levelSelect .subtitle {
      color: #888;
      font-size: 24px;
      margin-bottom: 50px;
      letter-spacing: 8px;
    }
    .level-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .level-btn {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(20, 20, 30, 0.9);
      border: 2px solid #333;
      padding: 20px 40px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      color: #fff;
      font-size: 18px;
    }
    .level-btn:hover {
      border-color: #15befc;
      background: rgba(30, 40, 60, 0.9);
      transform: translateX(10px);
    }
    .level-btn.locked {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .level-btn.locked:hover {
      transform: none;
      border-color: #333;
      background: rgba(20, 20, 30, 0.9);
    }
    .level-btn .level-num { color: #ff68fd; font-weight: bold; min-width: 70px; }
    .level-btn .level-name { font-weight: bold; min-width: 200px; }
    .level-btn .level-desc { color: #888; }
    .level-btn .lock-icon { display: none; margin-left: 10px; }
    .level-btn.locked .lock-icon { display: inline; }
    .level-btn .training-tag { background: #2a6; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 8px; }
    .level-btn .music-tag { background: #a36; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 8px; }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <!-- Game Over -->
  <div id="gameOver">
    <h1>Game Over</h1>
    <p id="continueCount" style="color:#888;margin-bottom:20px;">剩余继续次数：3</p>
    <div class="btn-group">
      <button id="restartBtn" class="btn btn-primary">返回选关</button>
      <button id="continueBtn" class="btn btn-secondary">继续</button>
    </div>
  </div>

  <!-- Combo Display -->
  <div id="comboDisplay">
    <div id="comboText">PERFECT</div>
    <div id="comboCount">x1</div>
  </div>

  <!-- Countdown -->
  <div id="countdownDisplay">3</div>

  <!-- Victory -->
  <div id="victory">
    <h1 id="victoryTitle">Victory!</h1>
    <p id="victorySubtitle">关卡完成!</p>
    <div class="btn-group">
      <button id="nextLevelBtn" class="btn btn-secondary">Next Level</button>
      <button id="victoryBtn" class="btn btn-primary">Level Select</button>
    </div>
  </div>

  <!-- Distance Display -->
  <div id="distanceDisplay">
    <div id="currentDistance">0m</div>
    <div id="targetDistance">???m</div>
  </div>

  <!-- Level Name -->
  <div id="levelName">
    <span id="levelNum">第1关</span>
    <span class="level-title" id="levelTitle">Miller's Planet</span>
  </div>

  <!-- Menu Button -->
  <button id="menuBtn">菜单</button>

  <!-- Level Select -->
  <div id="levelSelect">
    <h1>星际穿越</h1>
    <p class="subtitle">Interstellar</p>
    <div class="level-list" id="levelList"></div>
  </div>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
